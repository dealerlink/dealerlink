version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: dealerlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dealerlink
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: dealerlink_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealerlink -d dealerlink_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dealerlink-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@dealerlink.local
      PGADMIN_DEFAULT_PASSWORD: dev_password_change_me
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres-data: