<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Distribyte — Distributor CRM</title>

<style id="print-overrides">
@page { size: 1500px 940px; margin: 0; }
@media print {
  html, body { background: #fff !important; }
  body * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  /* hide canvas chrome */
  .canvas > header { display: none !important; }
  .canvas { background: #fff !important; }
  .ab-label, .ab-title { display: none !important; }
  /* stack artboards vertically, one per page */
  .canvas > div.flex.gap-12 {
    display: block !important;
    padding: 0 !important;
    overflow: visible !important;
  }
  .canvas > div.flex.gap-12 > div {
    page-break-after: always;
    break-after: page;
    margin: 0 !important;
    padding: 0 !important;
  }
  .canvas > div.flex.gap-12 > div:last-child {
    page-break-after: auto;
    break-after: auto;
  }
  .artboard {
    box-shadow: none !important;
    border: none !important;
    width: 1500px !important;
    height: 940px !important;
    overflow: hidden !important;
  }
  /* hide tweaks panel */
  .twk-panel, [class*="twk-"] { display: none !important; }
}

<style>
  :root{
    --ink:#0B0F1A;
    --ink-2:#1A2030;
    --paper:#F7F7F4;
    --paper-2:#EFEFEA;
    --line:#E3E3DC;
    --line-2:#D5D5CC;
    --mute:#6B7280;
    --mute-2:#94928A;
    --accent:#3730A3;       /* deep indigo */
    --accent-2:#4F46E5;
    --emerald:#047857;
    --amber:#B45309;
    --rose:#B91C1C;
    --tile:#FBFBF8;
  }
  html,body{background:#E8E8E2;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    font-feature-settings:"ss01","cv11";
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono',ui-monospace,monospace; font-feature-settings:"tnum","zero";}
  .tnum{font-variant-numeric:tabular-nums;}
  .serif-i{font-family:'Instrument Serif',serif; font-style:italic;}
  .hairline{box-shadow:inset 0 0 0 1px var(--line);}
  .hairline-b{border-bottom:1px solid var(--line);}
  .hairline-t{border-top:1px solid var(--line);}
  .hairline-r{border-right:1px solid var(--line);}
  .hairline-l{border-left:1px solid var(--line);}
  .ticked{background-image:linear-gradient(to right,var(--line) 1px,transparent 1px); background-size:8px 100%;}
  .grid-bg{
    background-color:var(--paper);
    background-image:
      linear-gradient(to right, rgba(11,15,26,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(11,15,26,0.04) 1px, transparent 1px);
    background-size:24px 24px;
  }
  .dot{width:6px;height:6px;border-radius:9999px;display:inline-block;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;font-size:11px;line-height:18px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--ink);}
  .chip.ghost{background:transparent;}
  .chip.solid{background:var(--ink);color:#fff;border-color:var(--ink);}
  .kbd{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:1px 5px;border:1px solid var(--line);border-bottom-width:2px;border-radius:3px;background:#fff;color:var(--mute);}
  .num{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
  .titlecaps{font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--mute);font-weight:500;}
  .row-h{height:56px;}
  .btn{height:36px;padding:0 12px;border-radius:6px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;color:var(--ink);}
  .btn:hover{background:var(--paper-2);}
  .btn-pri{background:var(--ink);color:#fff;border-color:var(--ink);}
  .btn-pri:hover{background:#000;}
  .btn-acc{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn-acc:hover{background:var(--accent-2);}
  .btn-sm{height:28px;padding:0 10px;font-size:12px;border-radius:5px;}
  .icon-btn{height:32px;width:32px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;color:var(--mute);}
  .icon-btn:hover{background:var(--paper-2);color:var(--ink);}
  .nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:5px;font-size:13px;color:#C9CAD3;}
  .nav-item:hover{background:rgba(255,255,255,0.05);color:#fff;}
  .nav-item.active{background:rgba(255,255,255,0.08);color:#fff;}
  .nav-item .num-side{margin-left:auto;font-size:10.5px;color:#7C7E89;}
  .nav-item.active .num-side{color:#A8A9B3;}

  /* canvas */
  .canvas{
    background-color:#E8E8E2;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(0,0,0,0.18) 1px, transparent 0);
    background-size:18px 18px;
  }
  .artboard{
    width:1440px;
    background:var(--paper);
    box-shadow:0 1px 0 rgba(0,0,0,0.05), 0 30px 60px -20px rgba(0,0,0,0.18);
    border:1px solid var(--line);
    overflow:hidden;
  }
  .ab-label{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A52;font-family:'IBM Plex Mono',monospace;display:flex;align-items:baseline;gap:10px;}
  .ab-num{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:#1A2030;text-transform:none;letter-spacing:0;}
  .ab-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:34px;color:#1A2030;line-height:1;}

  /* small bar chart util */
  .bar{background:var(--ink);}
  .bar.acc{background:var(--accent);}
  .bar.lite{background:#CFCFC6;}
  .bar.em{background:var(--emerald);}
  .bar.am{background:var(--amber);}
  .bar.ro{background:var(--rose);}

  /* table sticky header look */
  .table-head{background:#FBFBF8;border-bottom:1px solid var(--line);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--mute);}
  .row:hover{background:#FBFBF8;}

  /* status dots */
  .s-em{background:var(--emerald);}
  .s-am{background:var(--amber);}
  .s-ro{background:var(--rose);}
  .s-in{background:var(--accent);}
  .s-mu{background:#9CA3AF;}

  /* funnel bars */
  .fbar{background:linear-gradient(90deg, var(--ink), #2A2F40);}

  /* pipeline column hairlines */
  .col-hair{background:var(--paper);box-shadow:inset 1px 0 0 var(--line);}

  /* avatar */
  .av{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:9999px;font-size:10px;font-weight:600;letter-spacing:0.04em;color:#fff;}

  /* preview paper */
  .paper{background:#FFF;box-shadow:0 1px 0 rgba(0,0,0,0.04),0 12px 30px -12px rgba(0,0,0,0.18);}

  /* skeleton row option (unused but documented) */
  .skel{background:linear-gradient(90deg,#EEEEE7,#F5F5EE,#EEEEE7);background-size:200% 100%;animation:sk 1.6s linear infinite;}
  @keyframes sk{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

  details > summary{list-style:none; cursor:pointer;}
  details > summary::-webkit-details-marker{display:none;}
</style>
</head>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">

const { useState, useEffect, useRef, useMemo, useContext, createContext } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "userName": "Akshay Mittal",
  "company": "Mittal Distributors",
  "greeting": "Good morning"
}/*EDITMODE-END*/;

const TweakCtx = createContext(TWEAK_DEFAULTS);
const useTweakValues = () => useContext(TweakCtx);
// shim so existing inline references `tweaks.userName` keep working in JSX scope
let tweaks = TWEAK_DEFAULTS;

/* ============================================================
   PRIMITIVES
============================================================ */
const Icon = ({name, size=16, className=""}) => (
  <i data-lucide={name} style={{width:size,height:size}} className={className}></i>
);

const Avatar = ({initials, color="#3730A3"}) => (
  <span className="av" style={{background:color}}>{initials}</span>
);

const Chip = ({children, tone="default", dot}) => {
  const tones = {
    default: "bg-white border-[#E3E3DC] text-[#0B0F1A]",
    ink: "bg-[#0B0F1A] border-[#0B0F1A] text-white",
    em: "bg-[#ECFDF5] border-[#A7F3D0] text-[#065F46]",
    am: "bg-[#FFFBEB] border-[#FCD34D] text-[#92400E]",
    ro: "bg-[#FEF2F2] border-[#FCA5A5] text-[#991B1B]",
    in: "bg-[#EEF2FF] border-[#C7D2FE] text-[#3730A3]",
    mu: "bg-[#F3F4F6] border-[#E5E7EB] text-[#4B5563]",
  };
  const dotCls = {em:"#10B981", am:"#F59E0B", ro:"#EF4444", in:"#4F46E5", mu:"#9CA3AF", ink:"#fff", default:"#0B0F1A"}[tone];
  return (
    <span className={`inline-flex items-center gap-[6px] px-2 h-[20px] rounded-[4px] border text-[11px] font-medium ${tones[tone]}`}>
      {dot && <span className="dot" style={{background:dotCls}}></span>}
      {children}
    </span>
  );
};

const Section = ({eyebrow, title, right, children}) => (
  <section className="bg-white hairline rounded-[8px]">
    <header className="flex items-end justify-between px-5 pt-4 pb-3 hairline-b">
      <div>
        {eyebrow && <div className="titlecaps">{eyebrow}</div>}
        <h3 className="text-[15px] font-semibold tracking-[-0.01em] mt-1">{title}</h3>
      </div>
      <div className="flex items-center gap-2">{right}</div>
    </header>
    {children}
  </section>
);

/* ============================================================
   APP CHROME — sidebar + topbar shared across screens
============================================================ */
const NAV = [
  {key:"home", label:"Overview", icon:"layout-dashboard", count:"" },
  {key:"pipe", label:"Pipeline", icon:"git-branch", count:"42" },
  {key:"deal", label:"Dealers", icon:"users-round", count:"218" },
  {key:"prod", label:"Catalog", icon:"package", count:"86" },
  {key:"inv",  label:"Inventory", icon:"box", count:"4,812" },
  {key:"quot", label:"Quotations", icon:"file-text", count:"19" },
  {key:"ord",  label:"Orders", icon:"receipt", count:"34" },
  {key:"pay",  label:"Payments", icon:"banknote", count:"" },
  {key:"dis",  label:"Dispatch", icon:"truck", count:"7" },
  {key:"rep",  label:"Reports", icon:"bar-chart-3", count:"" },
];

const Sidebar = ({active}) => {
  const tweaks = useTweakValues();
  const initials = tweaks.userName.split(' ').map(w=>w[0]).slice(0,2).join('');
  return (
  <aside className="w-[232px] shrink-0 bg-[#0B0F1A] text-white flex flex-col" style={{minHeight:"100%"}}>
    <div className="px-4 pt-4 pb-3 flex items-center gap-2.5">
      <div className="relative h-[26px] w-[26px] rounded-[6px] bg-white flex items-center justify-center">
        <span className="absolute inset-[3px] rounded-[3px] border border-[#0B0F1A]"></span>
        <span className="absolute h-[2px] w-[12px] bg-[#0B0F1A]" style={{transform:"rotate(-32deg)"}}></span>
        <span className="absolute h-[2px] w-[8px] bg-[#0B0F1A]" style={{transform:"rotate(-32deg) translate(0, 6px)"}}></span>
      </div>
      <div className="leading-tight">
        <div className="text-[14px] font-semibold tracking-[-0.01em]">Distribyte</div>
        <div className="text-[10.5px] text-[#7C7E89] mono">{tweaks.company.toLowerCase().replace(/\s+/g,'-')}</div>
      </div>
      <button className="ml-auto icon-btn !text-[#7C7E89] hover:!bg-white/5"><Icon name="chevrons-left" size={14}/></button>
    </div>

    <div className="px-3 pt-2">
      <div className="flex items-center gap-2 h-[32px] px-2 rounded-[5px] bg-white/5 text-[12px] text-[#9FA1AB]">
        <Icon name="search" size={13}/>
        <span>Quick find</span>
        <span className="ml-auto kbd !bg-transparent !border-white/15 !text-[#9FA1AB]">⌘K</span>
      </div>
    </div>

    <nav className="px-2 pt-3 flex flex-col gap-[1px]">
      {NAV.map(n=>(
        <a key={n.key} className={`nav-item ${active===n.key?'active':''}`}>
          <Icon name={n.icon} size={15}/>
          <span>{n.label}</span>
          {n.count && <span className="num-side mono">{n.count}</span>}
        </a>
      ))}
    </nav>

    <div className="mt-auto px-3 pb-3 pt-4 border-t border-white/8">
      <div className="text-[10.5px] mono text-[#7C7E89] uppercase tracking-[0.08em] mb-2 px-1">Books · FY 25–26</div>
      <div className="rounded-[6px] bg-white/5 p-3">
        <div className="flex items-baseline justify-between">
          <div className="text-[10.5px] text-[#9FA1AB] uppercase tracking-[0.1em]">Quota MTD</div>
          <div className="mono text-[11px] text-[#A8A9B3]">68%</div>
        </div>
        <div className="mt-2 h-[3px] bg-white/10 rounded-full overflow-hidden">
          <div className="h-full bg-white rounded-full" style={{width:"68%"}}></div>
        </div>
        <div className="mt-2 text-[12px] mono">₹3.42 Cr <span className="text-[#7C7E89]">/ ₹5.00 Cr</span></div>
      </div>
      <div className="mt-3 flex items-center gap-2 px-1">
                <Avatar initials={tweaks.userName.split(' ').map(w=>w[0]).slice(0,2).join('')} color="#3730A3"/>
        <div className="leading-tight">
          <div className="text-[12px]">{tweaks.userName}</div>
          <div className="text-[10.5px] text-[#7C7E89] mono">admin · sales</div>
        </div>
        <button className="ml-auto icon-btn !text-[#7C7E89] hover:!bg-white/5"><Icon name="settings" size={14}/></button>
      </div>
    </div>
  </aside>
  );
};

const Topbar = ({crumbs=[], right=null}) => (
  <div className="h-[52px] hairline-b bg-[#FBFBF8] flex items-center px-5 gap-3">
    <div className="flex items-center gap-2 text-[12.5px] text-[#6B7280]">
      {crumbs.map((c,i)=>(
        <React.Fragment key={i}>
          {i>0 && <Icon name="chevron-right" size={12}/>}

        </React.Fragment>
      ))}
    </div>
    <div className="ml-auto flex items-center gap-2">
      {right}
      <div className="hairline-l h-6 mx-1"></div>
      <button className="icon-btn relative">
        <Icon name="bell" size={15}/>
        <span className="absolute top-1.5 right-1.5 w-1.5 h-1.5 rounded-full" style={{background:"var(--accent)"}}></span>
      </button>
      <button className="icon-btn"><Icon name="moon" size={15}/></button>
      <button className="icon-btn"><Icon name="circle-help" size={15}/></button>
    </div>
  </div>
);

/* ============================================================
   SHELL — common page frame
============================================================ */
const Shell = ({active, crumbs, topRight, children}) => (
  <div className="flex" style={{height:900}}>
    <Sidebar active={active}/>
    <div className="flex-1 flex flex-col min-w-0 bg-[#F7F7F4]">
      <Topbar crumbs={crumbs} right={topRight}/>
      <div className="flex-1 overflow-hidden">{children}</div>
    </div>
  </div>
);

/* ============================================================
   1) DASHBOARD
============================================================ */
const KPI = ({label, value, unit, delta, deltaTone, sparkline, sub}) => (
  <div className="bg-white hairline rounded-[8px] p-5 flex flex-col gap-3 relative overflow-hidden">
    <div className="flex items-center justify-between">
      <div className="titlecaps">{label}</div>
      <Icon name="arrow-up-right" size={14} className="text-[#9CA3AF]"/>
    </div>
    <div className="flex items-baseline gap-1.5">
      {unit && <span className="text-[14px] text-[#6B7280] mono">{unit}</span>}
      <span className="num text-[30px] font-semibold tracking-[-0.02em] leading-none">{value}</span>
    </div>
    <div className="flex items-end justify-between gap-2">
      <div className="text-[11.5px] text-[#6B7280]">{sub}</div>
      <div className="flex items-end gap-[3px] h-[26px]">
        {sparkline.map((h,i)=>(
          <span key={i} className="bar" style={{width:4, height:`${h}%`, opacity: i===sparkline.length-1?1:0.3+i*0.06}}></span>
        ))}
      </div>
    </div>
    <div className="hairline-t pt-2.5 flex items-center gap-2">
      <span className={`mono text-[11.5px] ${deltaTone==="em"?"text-[#047857]":deltaTone==="ro"?"text-[#B91C1C]":"text-[#6B7280]"}`}>
        {delta}
      </span>
      <span className="text-[11.5px] text-[#94928A]">vs last period</span>
    </div>
  </div>
);

const FUNNEL = [
  {n:1, name:"Lead Identified",   count:14, value:"82.40 L"},
  {n:2, name:"Requirement",       count:11, value:"94.10 L"},
  {n:3, name:"Quotation Sent",    count: 9, value:"1.18 Cr"},
  {n:4, name:"Negotiation",       count: 6, value:"86.50 L"},
  {n:5, name:"Order Confirmed",   count: 5, value:"72.20 L"},
  {n:6, name:"Payment Pending",   count: 4, value:"54.60 L"},
  {n:7, name:"Ready for Dispatch",count: 3, value:"41.80 L"},
  {n:8, name:"Dispatched",        count: 7, value:"96.10 L"},
  {n:9, name:"Closed",            count:11, value:"1.42 Cr"},
];

const ACTIVITY = [
  {t:"09:42", who:"AK", whoColor:"#0F766E", txt:<>Anjali Kapoor moved <b>Surya Solar Solutions</b> from <i>Negotiation</i> to <i>Order Confirmed</i></>, tag:"pipeline"},
  {t:"09:18", who:"DV", whoColor:"#9D174D", txt:<>Dispatch reserved <b>184 serials</b> for ORD-2611 (Uma Trading Co)</>, tag:"inventory"},
  {t:"08:55", who:"RM", whoColor:"#3730A3", txt:<>Payment of <b>₹14,82,000</b> reconciled against PI-1108 — Green Power EPC</>, tag:"accounts"},
  {t:"Yest.", who:"NP", whoColor:"#7C2D12", txt:<>Quotation <b>QT-0921</b> sent to Shanti Agrovet · 540 Wp Mono · 320 nos</>, tag:"sales"},
  {t:"Yest.", who:"AK", whoColor:"#0F766E", txt:<>Risk flag raised on <b>Veer Renewables</b> — credit limit breach by ₹6.20 L</>, tag:"risk"},
  {t:"Yest.", who:"DV", whoColor:"#9D174D", txt:<>LR <span className="mono">MH-12-DR-7740</span> generated for ORD-2598</>, tag:"dispatch"},
];

const TASKS = [
  {due:"Today, 4 PM", title:"Call back — Aarav Solar Pvt Ltd",  meta:"Negotiation · QT-0917", urgent:true},
  {due:"Today",       title:"Send revised quote to Surya Solar", meta:"Stage 4 · ₹38.20 L"},
  {due:"Tomorrow",    title:"Follow up payment — Green Power EPC", meta:"Overdue 12d · ₹14.82 L", urgent:true},
  {due:"02 May",      title:"Confirm dispatch slot — Uma Trading", meta:"184 panels · Mumbai"},
  {due:"03 May",      title:"Reconcile UTR — HDFC ******2204", meta:"₹6,40,000"},
];

const TOP_DEALERS = [
  {name:"Uma Trading Co",        city:"Mumbai, MH",     value:"47.80 L", deals:8, trend:[20,38,30,55,50,72,88]},
  {name:"Surya Solar Solutions", city:"Bengaluru, KA",  value:"38.20 L", deals:5, trend:[10,18,25,22,40,38,62]},
  {name:"Green Power EPC",       city:"Coimbatore, TN", value:"31.40 L", deals:6, trend:[40,30,22,28,18,32,44]},
  {name:"Shanti Agrovet",        city:"Guwahati, AS",   value:"22.10 L", deals:4, trend:[12,20,16,24,22,30,28]},
  {name:"Veer Renewables",       city:"Jaipur, RJ",     value:"19.60 L", deals:3, trend:[8,14,18,12,20,16,22]},
];

const Dashboard = () => {
  const tweaks = useTweakValues();
  return (
  <Shell
    active="home"
    crumbs={[tweaks.company,"Overview"]}
    topRight={
      <div className="flex items-center gap-2">
        <div className="chip ghost"><Icon name="calendar" size={12}/> May 01 → May 06, 2026</div>
        <button className="btn btn-sm"><Icon name="filter" size={13}/> Filters</button>
        <button className="btn btn-sm btn-pri"><Icon name="plus" size={13}/> New deal</button>
      </div>
    }>
    <div className="h-full overflow-auto px-6 py-5">
      {/* hero strip */}
      <div className="flex items-end justify-between mb-5">
        <div>
          <div className="titlecaps">Wednesday · 06 May 2026</div>
          <h1 className="text-[28px] font-semibold tracking-[-0.02em] mt-1">
            {tweaks.greeting}, {tweaks.userName.split(' ')[0]}. <span className="serif-i text-[#6B7280] font-normal">Six things need your attention today.</span>
          </h1>
        </div>
        <div className="flex items-center gap-5">

  // Indian formatting (lakh/crore)
  const x = Math.round(n);
  const s = x.toString();
  if(s.length<=3) return s;
  const last3 = s.slice(-3);
  const rest = s.slice(0,-3);
  const formatted = rest.replace(/\B(?=(\d{2})+(?!\d))/g,",") + "," + last3;
  return formatted;
};

                <tbody>
                  {lines.map((l,i)=>(
                    <tr key={i} className="border-b border-[#E3E3DC]">
                      <td className="py-1.5">
                        <div className="font-medium">{l.model}</div>
                        <div className="mono text-[6.5px] text-[#6B7280]">HSN {l.hsn}</div>
                      </td>
                      <td className="num text-right">{l.qty}</td>
                      <td className="num text-right">{fmtINR(l.rate)}</td>
                      <td className="num text-right">{fmtINR(l.taxable)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>

              <div className="mt-3 flex justify-end">
                <table className="text-[8.5px]" style={{width:"60%"}}>
                  <tbody>
                    <tr><td className="text-[#6B7280] py-0.5">Taxable</td><td className="num text-right">₹{fmtINR(taxable)}</td></tr>
                    <tr><td className="text-[#6B7280] py-0.5">IGST 12%</td><td className="num text-right">₹{fmtINR(tax)}</td></tr>
                    <tr className="border-t border-[#0B0F1A]"><td className="font-semibold py-1">Grand total</td><td className="num text-right font-semibold">₹{fmtINR(grand)}</td></tr>
                  </tbody>
                </table>
              </div>

              <div className="mt-3 text-[8px] text-[#1A2030] leading-snug">
                <div className="text-[#6B7280] uppercase tracking-[0.08em] text-[7.5px] mb-1">Terms</div>
                Prices ex-warehouse, Mumbai. Lead time 7–10 working days from PI confirmation. Payment: 30% advance, 70% before dispatch.
              </div>

              <div className="mt-6 grid grid-cols-2 gap-3 text-[8px]">
                <div>
                  <div className="border-t border-[#0B0F1A] pt-1 text-[#6B7280]">Authorised signatory</div>
                  <div className="mt-3 serif-i text-[12px] text-[#1A2030]">{tweaks.userName}</div>
                </div>
                <div className="text-right">
                  <div className="text-[#6B7280]">{tweaks.company} Pvt Ltd</div>
                  <div className="mono text-[6.5px] text-[#94928A] mt-0.5">Page 1 of 1 · QT-0921</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </Shell>
  );
};

/* ============================================================
   CANVAS
============================================================ */
const Artboard = ({n, label, name, w=1440, h=900, children}) => (
  <div className="flex flex-col gap-3" data-screen-label={`${String(n).padStart(2,'0')} ${name}`}>
    <div className="flex items-baseline justify-between">
      <div className="ab-label">
        <span className="ab-num">{String(n).padStart(2,'0')}</span>
        <span>{label}</span>
        <span className="text-[#9C9B91]">· {w}×{h}</span>
      </div>
      <div className="ab-title">{name}</div>
    </div>
    <div className="artboard" style={{width:w, height:h}}>
      {children}
    </div>
  </div>
);

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  return (
    <TweakCtx.Provider value={tweaks}>
    <div className="canvas min-h-screen">
      {/* canvas header */}
      <header className="px-10 pt-10 pb-6 max-w-[1440px]">
        <div className="flex items-center gap-2 text-[11px] mono text-[#5A5A52] uppercase tracking-[0.14em]">
          <span className="dot" style={{background:"#0B0F1A"}}></span>
          Distribyte · UI exploration · v0.3
        </div>
        <h1 className="font-[Instrument_Serif] italic text-[68px] leading-[0.95] mt-3 text-[#0B0F1A]" style={{fontFamily:"'Instrument Serif',serif",fontStyle:"italic"}}>
          A distributor's<br/>operating console.
        </h1>
        <p className="mt-4 max-w-[640px] text-[14px] leading-relaxed text-[#3F3F38]">
          Four anchor screens for <b>{tweaks.company}</b> — built around the rhythms of solar panel sale: pipeline discipline, serial-tracked stock, GST-correct paperwork, and dealer health at a glance. Inter for surface, IBM Plex Mono for every number that has to add up. Slate ink on warm paper; one indigo accent reserved for forward action.
        </p>
        <div className="mt-5 flex items-center gap-2 text-[11.5px] text-[#5A5A52]">
          <span className="chip">01 · Overview</span>
          <span className="chip">02 · Pipeline</span>
          <span className="chip">03 · Dealer master</span>
          <span className="chip">04 · Quotation builder</span>
          <span className="ml-3 mono text-[10.5px]">scroll →</span>
        </div>
      </header>

      <div className="flex gap-12 px-10 pb-20 overflow-x-auto">
        <Artboard n={1} label="HOME · OVERVIEW"          name="Dashboard">         <Dashboard/>          </Artboard>
        <Artboard n={2} label="DEALS · PIPELINE"         name="Sales pipeline">    <Pipeline/>           </Artboard>
        <Artboard n={3} label="CRM · DEALER MASTER"      name="Dealer book">       <Dealers/>            </Artboard>
        <Artboard n={4} label="DOCS · QUOTATION BUILDER" name="New quotation">     <QuotationBuilder/>   </Artboard>
      </div>

      <TweaksPanel>
        <TweakSection label="Identity"/>
        <TweakText label="Your name" value={tweaks.userName} onChange={v=>setTweak('userName',v)}/>
        <TweakText label="Company"   value={tweaks.company}  onChange={v=>setTweak('company',v)}/>
        <TweakRadio label="Greeting" value={tweaks.greeting}
          options={["Good morning","Good afternoon","Hey"]}
          onChange={v=>setTweak('greeting',v)}/>
      </TweaksPanel>
    </div>
    </TweakCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// auto-print after fonts + render settle
(async () => {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e){}
  await new Promise(r => setTimeout(r, 800));
  window.print();
})();

</script>
</body>
</html>
