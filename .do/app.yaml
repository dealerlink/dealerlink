# Dealerlink staging — DO App Platform spec
#
# Source of truth for the staging deploy. Manual UI changes drift; always
# update this file + push.
#
# Conventions:
#   - `type: SECRET` env vars have NO `value:` here — they are committed
#     intentionally blank. Real values live in
#     C:\Users\rohit\.dealerlink\staging-secrets.txt and are populated into
#     the running app via the UI or `doctl apps spec update`. This file
#     is committed; secrets are not.
#   - `scope: RUN_AND_BUILD_TIME` is used for anything Next.js needs at build
#     (NEXT_PUBLIC_*, NODE_ENV, Sentry build-time config). Server-only
#     secrets are RUN_TIME so they don't bake into the client bundle.
#
# Provision the cluster separately (see staging-secrets.txt). This spec
# attaches an existing DB cluster, it doesn't create one.

name: dealerlink-staging
region: blr

services:
  - name: web
    github:
      repo: dealerlink/dealerlink
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: corepack enable && pnpm install --frozen-lockfile && pnpm --filter web build
    run_command: pnpm --filter web start
    http_port: 3000
    instance_size_slug: basic-xs
    instance_count: 1
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      # --- DB (app role for runtime queries — RLS enforced) ---
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      # --- DB (doadmin for Lucia session validation + pg-boss enqueue) ---
      - key: DATABASE_DIRECT_URL
        scope: RUN_TIME
        type: SECRET
      # --- Auth ---
      - key: SESSION_SECRET
        scope: RUN_TIME
        type: SECRET
      # --- Email (Resend) ---
      - key: RESEND_INBOUND_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_FROM_EMAIL
        scope: RUN_TIME
        value: onboarding@resend.dev
      # --- Sentry ---
      - key: SENTRY_DSN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_SENTRY_DSN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SENTRY_ENVIRONMENT
        scope: RUN_AND_BUILD_TIME
        value: staging
      - key: NEXT_PUBLIC_SENTRY_ENVIRONMENT
        scope: RUN_AND_BUILD_TIME
        value: staging
      # --- Observability ---
      - key: BETTERSTACK_SOURCE_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: AXIOM_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: AXIOM_DATASET
        scope: RUN_TIME
        value: dealerlink-events
      # --- App ---
      # NEXT_PUBLIC_APP_URL is set to the eventual custom domain even before
      # SSL is live so the client bundle's absolute URLs (emails, share links)
      # are correct from day one. The DO-provided *.ondigitalocean.app URL
      # still serves traffic until C1c switches DNS.
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: https://staging.dealerlink.in
      # Apex domain this environment serves tenants under. Tenant routing
      # resolves <slug>.<APP_DOMAIN> → tenant <slug> and the apex itself →
      # operator. Must be BUILD-time too — it's inlined into the Edge
      # middleware bundle. Production sets this to dealerlink.in (or omits it).
      - key: NEXT_PUBLIC_APP_DOMAIN
        scope: RUN_AND_BUILD_TIME
        value: staging.dealerlink.in
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: TZ
        scope: RUN_TIME
        value: Asia/Kolkata
      # Connection-pool caps for the basic 1GB DB tier (max_connections=25,
      # ~6-8 used by DO itself; 3 reserved for superuser). web + workers share
      # the budget, so keep the sum well under ~16. web here: 2+2+1 = 5.
      # See DEV.61.
      - key: DB_POOL_MAX
        scope: RUN_TIME
        value: '2'
      - key: DB_ADMIN_POOL_MAX
        scope: RUN_TIME
        value: '2'
      - key: PGBOSS_POOL_MAX
        scope: RUN_TIME
        value: '1'
      # How long a PDF Server Action waits for the workers process to render +
      # persist the document before returning a friendly "try again" error.
      # Code default is 15s; staging uses 120s so the FIRST render of a session
      # — a cold Chromium *launch* on the basic-xxs worker, ~60-90s (DEV.66/67) —
      # completes within the wait rather than erroring. Warm renders are ~5s.
      # Chromium's idle-recycle is 45 min (DEV.67), so the cold launch is paid
      # roughly once per active session. Revisit for production based on load.
      - key: PDF_RENDER_TIMEOUT_MS
        scope: RUN_TIME
        value: '120000'

workers:
  - name: workers
    github:
      repo: dealerlink/dealerlink
      branch: main
      deploy_on_push: true
    source_dir: /
    # Custom Dockerfile instead of the Node buildpack: the buildpack base image
    # lacks the Chromium runtime libs (libnss3 et al) the PDF pipeline needs.
    # See apps/workers/Dockerfile and DEV.63. Build context is the repo root
    # (source_dir: /); dockerfile_path is relative to it.
    dockerfile_path: apps/workers/Dockerfile
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_DIRECT_URL
        scope: RUN_TIME
        type: SECRET
      - key: SESSION_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_FROM_EMAIL
        scope: RUN_TIME
        value: onboarding@resend.dev
      - key: SENTRY_DSN
        scope: RUN_TIME
        type: SECRET
      - key: SENTRY_ENVIRONMENT
        scope: RUN_TIME
        value: staging
      - key: BETTERSTACK_SOURCE_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: AXIOM_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: AXIOM_DATASET
        scope: RUN_TIME
        value: dealerlink-events
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: TZ
        scope: RUN_TIME
        value: Asia/Kolkata
      # Connection-pool caps — see DEV.61. workers shares the 25-connection
      # budget with web. workers here: 2+1+2 = 5.
      - key: DB_POOL_MAX
        scope: RUN_TIME
        value: '2'
      - key: DB_ADMIN_POOL_MAX
        scope: RUN_TIME
        value: '1'
      - key: PGBOSS_POOL_MAX
        scope: RUN_TIME
        value: '2'
      # The workers process eager-warms Chromium at boot (DEV.66) so the first
      # PDF render isn't a slow cold start. It is ON by default in code; to
      # disable, add `PDF_EAGER_WARM` here with value 'false' (and apply the
      # spec — see docs/DEPLOYMENT.md / DEV.64).

databases:
  # production: true attaches an existing managed cluster (provisioned out-of-
  # band via `doctl databases create`). production: false would create an
  # inline dev DB bundled with the app, which is not what we want.
  - name: dealerlink-staging-db
    engine: PG
    version: '16'
    production: true
    cluster_name: dealerlink-staging-db
    db_name: dealerlink_staging
    db_user: doadmin

domains:
  # Apex staging host. DO provisions a Let's Encrypt cert via HTTP-01 — works
  # with external (Cloudflare) DNS because the CNAME points at the app.
  - domain: staging.dealerlink.in
    type: PRIMARY
  # Per-tenant subdomains. A true wildcard cert needs DNS-01, which DO can
  # only do when it manages the domain's DNS — ours is on Cloudflare. So we
  # enumerate the seeded tenants explicitly; each gets its own HTTP-01 cert.
  # New tenants need their subdomain added here until Stage D moves wildcard
  # SSL to a Cloudflare origin cert (proxied) or DO-managed DNS.
  - domain: demo.staging.dealerlink.in
    type: ALIAS
  - domain: sample.staging.dealerlink.in
    type: ALIAS
